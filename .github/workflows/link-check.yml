name: Link Check

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly on Mondays at 9:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,429
            --timeout 30
            --max-retries 3
            --exclude-mail
            README.md
          fail: true
      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Dead links detected in README"
          content-filepath: ./lychee/out.md
          labels: bug,maintenance
